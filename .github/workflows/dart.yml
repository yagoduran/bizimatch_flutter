name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate Flutter app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bizimatch_flutter
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Firebase config exists for CI
        run: |
          if [ ! -f android/app/google-services.json ]; then
            mkdir -p android/app
            cat > android/app/google-services.json <<'JSON'
            {
              "project_info": {
                "project_number": "1234567890",
                "project_id": "dummy-ci",
                "storage_bucket": "dummy-ci.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:1234567890:android:deadbeefdeadbeef",
                    "android_client_info": {
                      "package_name": "com.example.bizimatch_flutter"
                    }
                  },
                  "oauth_client": [],
                  "api_key": [
                    {
                      "current_key": "dummy-key"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }
            JSON
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Uncomment when unit/widget tests are stable in CI.
      # - name: Run tests
      #   run: flutter test --no-banner --reporter=expanded
