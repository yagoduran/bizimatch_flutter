name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate Flutter app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create dummy google-services.json
        run: |
          if [ ! -f android/app/google-services.json ]; then
            mkdir -p android/app
            echo "{}" > android/app/google-services.json
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Uncomment when unit/widget tests are stable in CI.
      # - name: Run tests
      #   run: flutter test --no-banner --reporter=expanded
